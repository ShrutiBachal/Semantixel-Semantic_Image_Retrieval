<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" href="Semantixel WebUI/assets/icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Force Graph Library -->
    <script src="https://unpkg.com/force-graph"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SemantiXel WebUI</title>
    <link rel="stylesheet" href="Semantixel WebUI/styles.css">
</head>

<body onload="initializeUI()">
    <header class="app-header">
        <a href="/" class="logo-link">
            <img src="Semantixel WebUI/assets/logo_text.png" alt="Semantixel Logo" class="app-logo">
        </a>
    </header>

    <section class="integration-bar" aria-label="Integrations">
        <div class="search-options">
            <div class="search-option">
                <button id="google-drive-connect-btn" onclick="connectGoogleDrive()" class="action-btn">
                    <i class="fab fa-google-drive"></i> Connect Google Drive
                </button>
            </div>
            <div class="search-option">
                <span id="google-drive-status">Google Drive: checking status...</span>
            </div>
        </div>
    </section>

    <main class="container">
        <!-- View Toggle -->
        <nav class="view-toggle" aria-label="View Toggle">
            <button id="btn-gallery-view" class="toggle-btn active" onclick="switchView('gallery')">
                <i class="fas fa-th"></i> Gallery View
            </button>
            <button id="btn-graph-view" class="toggle-btn" onclick="switchView('graph')">
                <i class="fas fa-project-diagram"></i> Graph View
            </button>
        </nav>

        <section class="search-section" aria-label="Search Controls">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Enter text to search">
                <select id="route-select" class="modern-select" onchange="changePlaceholder()">
                    <option value="clip_text">Caption search</option>
                    <option value="ebmed_text">Text content search</option>
                    <option value="clip_image">Similar images search</option>
                </select>
                <button onclick="performSearch()" class="search-btn"><i class="fas fa-search"></i> Search</button>
            </div>
            <div class="search-options">
                <div class="search-option">
                    <label for="threshold">Threshold:</label>
                    <input type="range" id="threshold" min="0" max="1" step="0.01" value="0">
                    <span id="threshold-value">0</span>
                    <button class="help-btn" onclick="showHelp('threshold')" title="Learn about threshold"
                        aria-label="Help with threshold">
                        <i class="fas fa-question-circle"></i>
                    </button>
                </div>
                <div class="search-option">
                    <label for="top-k">Top K:</label>
                    <input type="number" id="top-k" min="1" max="99" value="10">
                    <button class="help-btn" onclick="showHelp('topk')" title="Learn about Top K"
                        aria-label="Help with Top K">
                        <i class="fas fa-question-circle"></i>
                    </button>
                </div>
                <div class="search-option">
                    <label for="media-type">Media Type:</label>
                    <select id="media-type" class="modern-select filter-select">
                        <option value="all">All Media</option>
                        <option value="image">Images Only</option>
                        <option value="video">Videos Only</option>
                        <option value="audio">Audio Only</option>
                    </select>
                </div>
                <div class="search-option">
                    <button class="help-btn-main" onclick="showHelp('modes')" title="Learn about search modes">
                        <i class="fas fa-info-circle"></i> Guide
                    </button>
                </div>
            </div>
        </section>

        <!-- Gallery View Body -->
        <section id="gallery-view" class="view-section active-view" aria-label="Search Results">
            <div class="loader" id="loader" role="status" aria-label="Loading results"></div>
            <div class="results" id="results"></div>
        </section>

        <!-- Graph View Body -->
        <section id="graph-view" class="view-section" aria-label="Semantic Relationship Graph" style="display: none;">
            <div class="graph-controls">
                <button onclick="loadGraphData()" class="action-btn" id="btn-load-graph" style="display: none;">
                    <i class="fas fa-sync-alt"></i> Refresh Graph
                </button>
                <span class="graph-info"><i class="fas fa-info-circle"></i> Hover over nodes to preview. Click nodes to
                    expand.</span>
            </div>
            <div class="loader" id="graph-loader" role="status" aria-label="Loading graph" style="display: none;"></div>
            <div id="graph-container" class="graph-container"></div>
        </section>
    </main>

    <dialog class="enlarged-img" id="enlarged-img-container"></dialog>

    <!-- Image Path Display Panel -->
    <div class="image-path-panel" id="image-path-panel" style="display: none;">
        <div class="path-header">
            <h3><i class="fas fa-image"></i> Selected Image</h3>
            <button class="close-btn" onclick="closePathPanel()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="path-content">
            <div class="path-display">
                <label>File Path:</label>
                <div class="path-text" id="selected-image-path"></div>
                <button class="copy-btn" onclick="copyImagePath()" title="Copy path to clipboard">
                    <i class="fas fa-copy"></i> Copy
                </button>
            </div>
            <div class="path-actions">
                <button class="action-btn" onclick="openImageLocation()" title="Open file location">
                    <i class="fas fa-folder-open"></i> Open Location
                </button>
                <button class="action-btn" onclick="openImageInNewTab()" title="View full size">
                    <i class="fas fa-external-link-alt"></i> View Full Size
                </button>
            </div>
        </div>
    </div>

    <!-- Help Modal -->
    <div class="modal" id="help-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"><i class="fas fa-question-circle"></i> Help</h2>
                <button class="close-btn" onclick="closeHelpModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- <footer style="margin-top: 20px; text-align: center;">
        <p> <i class="fab fa-github"></i>
            <a href="https://github.com/KarunyaChavan/Semantixel-Semantic_Image_Retrieval">
                Semantixel
            </a>
        </p>
    </footer> -->

    <script>
        // Initialize UI on page load with default settings
        function initializeUI() {
            changePlaceholder();
            refreshGoogleDriveStatus();
        }

        function changePlaceholder() {
            var select = document.getElementById('route-select');
            var input = document.getElementById('search-input');
            var threshold = document.getElementById('threshold');
            var thresholdValue = document.getElementById('threshold-value');
            var topK = document.getElementById('top-k');

            // Clear the previous input when switching modes
            input.value = '';

            // Also clear previous results and enlarged image
            document.getElementById('results').innerHTML = '';
            document.getElementById('enlarged-img-container').innerHTML = '';

            // Close image path panel if open
            document.getElementById('image-path-panel').style.display = 'none';

            if (select.value == 'clip_text') {
                input.placeholder = 'Enter image caption or description';
                threshold.value = 0.15;
                thresholdValue.textContent = 0.15;
                topK.value = 5;
            } else if (select.value == 'clip_image') {
                input.placeholder = 'Enter image full path';
                threshold.value = 0.25;
                thresholdValue.textContent = 0.25;
                topK.value = 10;
            } else if (select.value == 'ebmed_text') {
                input.placeholder = 'Enter text to search for images with similar text';
                threshold.value = 0.1;
                thresholdValue.textContent = 0.1;
                topK.value = 3;
            }

            // Update the threshold slider background
            const percent = (threshold.value - threshold.min) / (threshold.max - threshold.min) * 100;
            threshold.style.background = `linear-gradient(to right, var(--accent-glow) 0%, var(--accent-glow) ${percent}%, var(--input-bg) ${percent}%, var(--input-bg) 100%)`;
        }

        function performSearch() {
            const query = document.getElementById('search-input').value;
            const route = document.getElementById('route-select').value;
            const threshold = parseFloat(document.getElementById('threshold').value);
            const topK = parseInt(document.getElementById('top-k').value);
            const mediaType = document.getElementById('media-type').value;
            const port = window.location.port || 8080;  // Default to 8080 if no port is specified
            const url = `http://${window.location.hostname}:${port}/${route}`;
            const loader = document.getElementById('loader');
            const resultsDiv = document.getElementById('results');
            const enlargedImgContainer = document.getElementById('enlarged-img-container');

            loader.style.display = 'block';
            resultsDiv.innerHTML = '';
            enlargedImgContainer.innerHTML = '';

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ query: query, threshold: threshold, top_k: topK, media_type: mediaType })
            })
                .then(response => response.json())
                .then(data => {
                    loader.style.display = 'none';

                    // --- SUBGRAPH INTERCEPT LOGIC ---
                    const isGraphView = document.getElementById('graph-view').style.display !== 'none';
                    if (isGraphView) {
                        const compositeIds = data.map(item => item.composite_id || item.media_id || item.path);

                        if (compositeIds.length === 0) {
                            initGraph({ nodes: [], links: [] });
                            return;
                        }

                        const graphLoader = document.getElementById('graph-loader');
                        graphLoader.style.display = 'block';

                        fetch(`http://${window.location.hostname}:${port}/subgraph_data`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ ids: compositeIds })
                        })
                            .then(res => res.json())
                            .then(graphData => {
                                initGraph(graphData);
                                graphLoader.style.display = 'none';

                                // Show the reset button to easily return to full graph
                                document.getElementById('btn-load-graph').style.display = 'inline-flex';
                            })
                            .catch(err => {
                                console.error("Subgraph fetch failed:", err);
                                graphLoader.style.display = 'none';
                            });

                        return; // Prevent rendering the standard gallery
                    }
                    // --------------------------------

                    data.forEach(item => {
                        let resultElement;

                        if (item.type === 'video') {
                            resultElement = document.createElement('figure');
                            resultElement.className = 'video-container';
                            resultElement.dataset.originalPath = item.display_path || item.path;

                            const video = document.createElement('video');
                            // Start video at the extracted timestamp
                            video.src = `http://${window.location.hostname}:${port}/images/${encodeURIComponent(item.media_id || item.path)}#t=${item.timestamp}`;
                            video.controls = true;
                            video.preload = "metadata";

                            // A semantic timestamp badge
                            const badge = document.createElement('figcaption');
                            badge.className = 'timestamp-badge';
                            badge.textContent = `Match at ${item.timestamp.toFixed(1)}s`;

                            resultElement.appendChild(video);
                            resultElement.appendChild(badge);

                            resultElement.onclick = () => {
                                displayEnlargedVideo(video.src);
                                highlightSelectedImage(resultElement);
                                showImagePath(item.display_path || item.path, item.media_id || item.path);
                            };
                        } else if (item.type === 'audio') {
                            resultElement = document.createElement('figure');
                            resultElement.className = 'audio-container';
                            resultElement.dataset.originalPath = item.path;

                            const audio = document.createElement('audio');
                            audio.src = `http://${window.location.hostname}:${port}/images/${encodeURIComponent(item.path)}`;
                            audio.controls = true;
                            audio.preload = "metadata";

                            const badge = document.createElement('figcaption');
                            badge.className = 'audio-badge';
                            badge.textContent = `Audio Match`;

                            resultElement.appendChild(audio);
                            resultElement.appendChild(badge);

                            resultElement.onclick = (e) => {
                                if (e.target !== audio) {
                                    highlightSelectedImage(resultElement);
                                    showImagePath(item.path);
                                }
                            };
                        } else {
                            resultElement = document.createElement('figure');
                            resultElement.className = 'image-container';
                            const img = document.createElement('img');
                            img.src = `http://${window.location.hostname}:${port}/images/${encodeURIComponent(item.media_id || item.path)}`;
                            resultElement.dataset.originalPath = item.display_path || item.path;

                            resultElement.appendChild(img);

                            resultElement.onclick = () => {
                                displayEnlargedImage(img.src);
                                highlightSelectedImage(resultElement);
                                showImagePath(item.display_path || item.path, item.media_id || item.path);
                            };
                        }

                        resultsDiv.appendChild(resultElement);
                    });
                })
                .catch(error => {
                    loader.style.display = 'none';
                    console.error('Error:', error);
                });
        }

        function displayEnlargedImage(src) {
            const enlargedImgContainer = document.getElementById('enlarged-img-container');
            enlargedImgContainer.innerHTML = '';

            const closeBtn = document.createElement('button');
            closeBtn.className = 'dialog-close-btn';
            closeBtn.innerHTML = '<i class="fas fa-times"></i>';
            closeBtn.onclick = () => enlargedImgContainer.close();

            const img = document.createElement('img');
            img.src = src;
            img.onclick = () => {
                window.open(src);
            };

            enlargedImgContainer.appendChild(closeBtn);
            enlargedImgContainer.appendChild(img);
            enlargedImgContainer.showModal();
        }

        function displayEnlargedVideo(src) {
            const enlargedImgContainer = document.getElementById('enlarged-img-container');
            enlargedImgContainer.innerHTML = '';

            const closeBtn = document.createElement('button');
            closeBtn.className = 'dialog-close-btn';
            closeBtn.innerHTML = '<i class="fas fa-times"></i>';
            closeBtn.onclick = () => enlargedImgContainer.close();

            const video = document.createElement('video');
            video.src = src;
            video.controls = true;
            video.autoplay = true;

            enlargedImgContainer.appendChild(closeBtn);
            enlargedImgContainer.appendChild(video);
            enlargedImgContainer.showModal();
        }

        function highlightSelectedImage(selectedElement) {
            const allElements = document.querySelectorAll('.results figure');
            allElements.forEach(el => {
                el.classList.remove('selected-img');
            });
            selectedElement.classList.add('selected-img');
        }

        // Add event listener for Enter key
        document.getElementById('search-input').addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                performSearch();
            }
        });

        // Global variable to store current image path
        let currentImagePath = '';
        let currentImageSrc = '';
        let currentImageFetchKey = '';

        // Image Path Panel Functions
        function showImagePath(path, fetchKey = path) {
            currentImagePath = path;
            currentImageFetchKey = fetchKey;
            currentImageSrc = `http://${window.location.hostname}:${window.location.port || 8080}/images/${encodeURIComponent(fetchKey)}`;

            document.getElementById('selected-image-path').textContent = path;
            document.getElementById('image-path-panel').style.display = 'block';

            // Smooth scroll to panel
            document.getElementById('image-path-panel').scrollIntoView({ behavior: 'smooth' });
        }

        function closePathPanel() {
            document.getElementById('image-path-panel').style.display = 'none';
        }

        async function copyImagePath() {
            try {
                await navigator.clipboard.writeText(currentImagePath);

                // Visual feedback
                const copyBtn = document.querySelector('.copy-btn');
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                copyBtn.style.backgroundColor = '#28a745';

                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.backgroundColor = '';
                }, 2000);

            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = currentImagePath;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                alert('Path copied to clipboard!');
            }
        }

        function openImageLocation() {
            if (currentImagePath.startsWith('Google Drive/')) {
                alert('This item is from Google Drive. Open it from your Drive account or use View Full Size.');
                return;
            }

            // For Windows, we'll show the user how to open the location manually
            const path = currentImagePath.replace(/\//g, '\\');
            const folder = path.substring(0, path.lastIndexOf('\\'));

            // Create a helpful dialog with instructions
            const message = `File Location:\n${folder}\n\nTo open this location:\n` +
                `1. Press Win + R\n` +
                `2. Type: explorer "${folder}"\n` +
                `3. Press Enter\n\n` +
                `Or copy the path below and paste it in File Explorer address bar.`;

            // Copy folder path to clipboard
            navigator.clipboard.writeText(folder).then(() => {
                alert(message + '\n\n✓ Folder path copied to clipboard!');
            }).catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = folder;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);

                alert(message + '\n\n✓ Folder path copied to clipboard!');
            });
        }

        function openImageInNewTab() {
            window.open(currentImageSrc, '_blank');
        }

        function refreshGoogleDriveStatus() {
            const port = window.location.port || 8080;
            fetch(`http://${window.location.hostname}:${port}/integrations/google_drive/status`)
                .then(res => res.json())
                .then(status => {
                    const statusEl = document.getElementById('google-drive-status');
                    const connectBtn = document.getElementById('google-drive-connect-btn');
                    if (!status.enabled) {
                        statusEl.textContent = 'Google Drive: disabled in config';
                        connectBtn.disabled = true;
                    } else if (!status.dependencies_available) {
                        statusEl.textContent = 'Google Drive: missing Python auth dependency';
                        connectBtn.disabled = true;
                    } else if (!status.client_secret_file) {
                        statusEl.textContent = 'Google Drive: add client_secret_file in config';
                        connectBtn.disabled = true;
                    } else if (!status.redirect_uri) {
                        statusEl.textContent = 'Google Drive: add redirect_uri in config';
                        connectBtn.disabled = true;
                    } else if (status.authorized) {
                        statusEl.textContent = 'Google Drive: connected';
                        connectBtn.disabled = true;
                        connectBtn.innerHTML = '<i class="fab fa-google-drive"></i> Google Drive Connected';
                    } else {
                        statusEl.textContent = 'Google Drive: not connected';
                        connectBtn.disabled = false;
                        connectBtn.innerHTML = '<i class="fab fa-google-drive"></i> Connect Google Drive';
                    }
                })
                .catch(() => {
                    document.getElementById('google-drive-status').textContent = 'Google Drive: status unavailable';
                    document.getElementById('google-drive-connect-btn').disabled = true;
                });
        }

        function connectGoogleDrive() {
            const port = window.location.port || 8080;
            fetch(`http://${window.location.hostname}:${port}/integrations/google_drive/auth/start`, {
                method: 'POST'
            })
                .then(async res => {
                    if (!res.ok) {
                        const message = await res.text();
                        throw new Error(message);
                    }
                    return res.json();
                })
                .then(data => {
                    window.open(data.authorization_url, '_blank');
                })
                .catch(err => {
                    alert(`Google Drive setup failed: ${err.message}`);
                    refreshGoogleDriveStatus();
                });
        }

        // Help System Functions
        function showHelp(type) {
            const modal = document.getElementById('help-modal');
            const title = document.getElementById('modal-title');
            const body = document.getElementById('modal-body');

            let content = '';

                title.innerHTML = '<i class="fas fa-sliders-h"></i> Threshold Help';
                content = `
                    <div class="help-section">
                        <h3>What is Threshold?</h3>
                        <p>Threshold controls the <strong>minimum similarity score</strong> required for images to appear in your results.</p>
                        
                        <div class="threshold-guide">
                            <div class="threshold-item">
                                <span class="threshold-value">0.0</span>
                                <div class="threshold-desc">
                                    <strong>Show All Results</strong><br>
                                    Returns all images, ranked by similarity.
                                </div>
                            </div>
                            <div class="threshold-item">
                                <span class="threshold-value">0.1</span>
                                <div class="threshold-desc">
                                    <strong>Broad Match</strong><br>
                                    Filters out only the least relevant results.
                                </div>
                            </div>
                            <div class="threshold-item">
                                <span class="threshold-value">0.2</span>
                                <div class="threshold-desc">
                                    <strong>Good Match</strong><br>
                                    Shows reasonably similar images.
                                </div>
                            </div>
                            <div class="threshold-item">
                                <span class="threshold-value">0.3+</span>
                                <div class="threshold-desc">
                                    <strong>High Similarity</strong><br>
                                    Very selective - may return few or no results.
                                </div>
                            </div>
                        </div>
                        
                        <div class="tip-box">
                            <i class="fas fa-lightbulb"></i>
                            <strong>Tip:</strong> CLIP similarity scores are typically low (0.1-0.3). Start with 0.0-0.1 for broad results, use 0.2+ for more precision.
                        </div>
                    </div>
                `;
            } else if (type === 'topk') {
                title.innerHTML = '<i class="fas fa-list-ol"></i> Top K Help';
                content = `
                    <div class="help-section">
                        <h3>What is Top K?</h3>
                        <p>Top K determines the <strong>maximum number of images</strong> to return in your search results.</p>
                        
                        <div class="topk-guide">
                            <div class="topk-item">
                                <span class="topk-value">3-5</span>
                                <span class="topk-desc">Quick overview of best matches</span>
                            </div>
                            <div class="topk-item">
                                <span class="topk-value">10-15</span>
                                <span class="topk-desc">Good balance for most searches</span>
                            </div>
                            <div class="topk-item">
                                <span class="topk-value">20+</span>
                                <span class="topk-desc">Comprehensive results (slower)</span>
                            </div>
                        </div>
                        
                        <div class="tip-box">
                            <i class="fas fa-lightbulb"></i>
                            <strong>Note:</strong> Actual results may be fewer if threshold filters out low-similarity images.
                        </div>
                    </div>
                `;
            } else if (type === 'modes') {
                title.innerHTML = '<i class="fas fa-search"></i> Search Modes Guide';
                content = `
                    <div class="help-section">
                        <h3>Search Modes Explained</h3>
                        
                        <div class="mode-card">
                            <div class="mode-header">
                                <i class="fas fa-camera"></i>
                                <h4>Caption Search</h4>
                                <span class="mode-tag">AI-Powered</span>
                            </div>
                            <p><strong>Find images by describing what's in them.</strong></p>
                            <div class="examples">
                                <div class="example-label">Examples:</div>
                                <span class="example">"a dog playing in the park"</span>
                                <span class="example">"sunset over mountains"</span>
                                <span class="example">"person using laptop"</span>
                            </div>
                            <div class="recommended-settings">
                                <strong>Recommended:</strong> Threshold 0.15, Top K 5-10
                            </div>
                        </div>
                        
                        <div class="mode-card">
                            <div class="mode-header">
                                <i class="fas fa-font"></i>
                                <h4>Text Content Search</h4>
                                <span class="mode-tag">OCR-Based</span>
                            </div>
                            <p><strong>Find images containing specific text.</strong></p>
                            <div class="examples">
                                <div class="example-label">Examples:</div>
                                <span class="example">"Microsoft"</span>
                                <span class="example">"error message"</span>
                                <span class="example">"login"</span>
                            </div>
                            <div class="recommended-settings">
                                <strong>Recommended:</strong> Threshold 0.1, Top K 3-5
                            </div>
                        </div>
                        
                        <div class="mode-card">
                            <div class="mode-header">
                                <i class="fas fa-images"></i>
                                <h4>Similar Images Search</h4>
                                <span class="mode-tag">Visual</span>
                            </div>
                            <p><strong>Find images that look similar to a reference image.</strong></p>
                            <div class="examples">
                                <div class="example-label">Input:</div>
                                <span class="example">Full image path or URL</span>
                            </div>
                            <div class="recommended-settings">
                                <strong>Recommended:</strong> Threshold 0.25, Top K 10-15
                            </div>
                        </div>

                        <div class="quick-tips">
                            <h4><i class="fas fa-rocket"></i> Quick Tips</h4>
                            <ul>
                                <li>Start with <strong>Caption Search</strong> for natural language queries</li>
                                <li>Use <strong>Text Content</strong> to find screenshots with specific text</li>
                                <li>Try <strong>Similar Images</strong> to find duplicates or variations</li>
                                <li>Lower threshold = More results (but less precise)</li>
                                <li>Higher threshold = Fewer results (but more accurate)</li>
                            </ul>
                        </div>
                    </div>
                `;
            }

            body.innerHTML = content;
            modal.style.display = 'flex';

            // Smooth scroll to top of modal
            setTimeout(() => {
                modal.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        function closeHelpModal() {
            document.getElementById('help-modal').style.display = 'none';
        }

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('help-modal');
            if (event.target === modal) {
                closeHelpModal();
            }
        }

        // Update threshold value display
        document.getElementById('threshold').addEventListener('input', function () {
            document.getElementById('threshold-value').textContent = this.value;
            const percent = (this.value - this.min) / (this.max - this.min) * 100;
            this.style.background = `linear-gradient(to right, var(--accent-glow) 0%, var(--accent-glow) ${percent}%, var(--input-bg) ${percent}%, var(--input-bg) 100%)`;
        });

        // View Toggling & Semantic Graph Logic
        let semanticGraph = null;

        function switchView(viewName) {
            // Update active buttons
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${viewName}-view`).classList.add('active');

            // Show appropriate section
            document.querySelectorAll('.view-section').forEach(sec => sec.style.display = 'none');
            document.getElementById(`${viewName}-view`).style.display = 'block';

            if (viewName === 'graph' && !semanticGraph) {
                // Initialize default empty graph if first time to prevent layout shift
                initGraph(null);
                // Automatically fetch and load graph data the first time
                loadGraphData();
            }
        }

        function initGraph(graphData) {
            const elem = document.getElementById('graph-container');
            const port = window.location.port || 8080;

            if (!semanticGraph) {
                semanticGraph = ForceGraph()(elem)
                    .width(elem.clientWidth)
                    .height(600)
                    .backgroundColor('rgba(0,0,0,0)')
                    .nodeLabel('fileName')
                    .nodeAutoColorBy('type')
                    .linkWidth(link => link.value * 2)
                    .linkColor(() => 'var(--border-color)')
                    .onNodeClick(node => {
                        const src = `http://${window.location.hostname}:${port}/images/${encodeURIComponent(node.media_id || node.path)}`;
                        if (node.type === 'video') {
                            displayEnlargedVideo(src + `#t=${node.timestamp}`);
                        } else {
                            displayEnlargedImage(src);
                        }
                        showImagePath(node.display_path || node.path, node.media_id || node.path);
                    })
                    .nodeCanvasObject((node, ctx, globalScale) => {
                        const label = node.fileName;
                        const isVideo = node.type === 'video';
                        const fontSize = 12 / globalScale;
                        ctx.font = `${fontSize}px Inter`;

                        // Draw Circle
                        const r = 5;
                        ctx.beginPath();
                        ctx.arc(node.x, node.y, r, 0, 2 * Math.PI, false);
                        ctx.fillStyle = isVideo ? '#ff4d4d' : '#4da3ff';
                        ctx.fill();

                        // Draw label text
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
                        ctx.fillText(label, node.x, node.y + 8);
                    });
            }

            if (graphData) {
                semanticGraph.graphData(graphData);
            }
        }

        function loadGraphData() {
            const btn = document.getElementById('btn-load-graph');
            const loader = document.getElementById('graph-loader');
            const port = window.location.port || 8080;
            const url = `http://${window.location.hostname}:${port}/graph_data`;

            btn.disabled = true;
            loader.style.display = 'block';

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    initGraph(data);
                    btn.disabled = false;
                    loader.style.display = 'none';

                    // Hide the reset button since we are back to default view
                    btn.style.display = 'none';
                })
                .catch(e => {
                    console.error("Graph fetch failed:", e);
                    btn.disabled = false;
                    loader.style.display = 'none';
                });
        }
    </script>
</body>

</html>
